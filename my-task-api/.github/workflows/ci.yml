name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Code Quality ─────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv pip install --system -e '.[dev]'

      - name: Run Ruff linter
        run: ruff check app/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check app/ tests/

  # ── Job 2: Tests ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck   # only runs if linting passed

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB:       tasks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv pip install --system -e '.[dev]'

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/tasks_test

      - name: Run pytest
        run: pytest -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/tasks_test
          SECRET_KEY:   test-only-secret-key

  # ── Job 3: Build Docker image ─────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test   # only runs if tests passed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-task-api:${{ github.sha }} .

      - name: Smoke test the image
        run: |
          docker run -d --name smoke-test \
            -e DATABASE_URL=sqlite+aiosqlite:///./test.db \
            -e SECRET_KEY=smoke-test-key \
            -p 8000:8000 my-task-api:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:8000/health
          docker stop smoke-test