name: CI / CD

on:  
  push:    
    branches: [main, develop]  
  pull_request:    
    branches: [main]

jobs:  
  # ── Job 1: Code Quality ─────────────────────────────────────  
  lint-and-typecheck:    
    name: Lint & Type Check    
    runs-on: ubuntu-latest    
    steps:      
      - name: Checkout code        
        uses: actions/checkout@v4      
      - name: Set up Python 3.12        
        uses: actions/setup-python@v5        
        with:          
          python-version: "3.12"      
      
      # FIX 1: Use the official, reliable uv installer for GitHub Actions
      - name: Install uv        
        uses: astral-sh/setup-uv@v5      
      
      # FIX 2: Removed the '-e' flag
      - name: Install dependencies        
        run: uv pip install --system '.[dev]'      
      
      - name: Run Ruff linter        
        run: ruff check app/ tests/      
      - name: Run Ruff formatter check        
        run: ruff format --check app/ tests/  

  # ── Job 2: Tests ─────────────────────────────────────────────  
  test:    
    name: Run Tests    
    runs-on: ubuntu-latest    
    needs: lint-and-typecheck    
    services:      
      postgres:        
        image: postgres:16-alpine        
        env:          
          POSTGRES_USER:     postgres          
          POSTGRES_PASSWORD: password          
          POSTGRES_DB:       tasks_test        
        ports:          
          - 5432:5432        
        options: >-          
          --health-cmd pg_isready          
          --health-interval 10s          
          --health-timeout 5s          
          --health-retries 5    
    steps:      
      - name: Checkout code        
        uses: actions/checkout@v4      
      - name: Set up Python 3.12        
        uses: actions/setup-python@v5        
        with:          
          python-version: "3.12"      
      
      - name: Install uv        
        uses: astral-sh/setup-uv@v5      
      
      # FIX 2: Removed the '-e' flag here too
      - name: Install dependencies        
        run: uv pip install --system '.[dev]'      
      
      - name: Run database migrations        
        run: alembic upgrade head        
        env:          
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/tasks_test      
      - name: Run pytest        
        run: pytest -v --tb=short        
        env:          
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/tasks_test          
          SECRET_KEY:   test-only-secret-key  

  # ── Job 3: Build Docker image ─────────────────────────────────  
  build:    
    name: Build Docker Image    
    runs-on: ubuntu-latest    
    needs: test       
    steps:      
      - name: Checkout code        
        uses: actions/checkout@v4      
      - name: Build Docker image        
        run: docker build -t my-task-api:${{ github.sha }} .      
      - name: Smoke test the image        
        run: |          
          docker run -d --name smoke-test \            
            -e DATABASE_URL=sqlite+aiosqlite:///./test.db \            
            -e SECRET_KEY=smoke-test-key \            
            -p 8000:8000 my-task-api:${{ github.sha }}          
          sleep 5          
          curl --fail http://localhost:8000/health          
          docker stop smoke-test